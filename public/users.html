<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - KELALBINGO Admin</title>
    <link rel="stylesheet" href="css/common.css">
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>KELALBINGO</h1>
            <div class="admin-info">
                <div id="adminName"></div>
            </div>
        </div>

        <ul class="sidebar-nav">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="users.html">User Management</a></li>
            <li><a href="packages.html">Balance Packages</a></li>
            <li><a href="logs.html">Activity Logs</a></li>
            <li><a href="change-password.html">Change Password</a></li>
        </ul>

        <div class="sidebar-footer">
            <button id="logoutBtn" class="btn btn-secondary btn-block">Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>User Management</h1>
            <p>Create and manage user accounts</p>
        </div>

        <div class="section">
            <h2>Create New User</h2>
            <form id="createUserForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="newUsername">Username</label>
                        <input type="text" id="newUsername" required>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">Password</label>
                        <input type="text" id="newPassword" required>
                    </div>

                    <div class="form-group">
                        <label for="machineSerial">Machine Serial Number</label>
                        <input type="text" id="machineSerial" required placeholder="e.g., 5CG9238K7K">
                    </div>

                    <div class="form-group">
                        <label for="expiresInDays">Expires In (days)</label>
                        <input type="number" id="expiresInDays" placeholder="Optional" min="1">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Create User</button>
                <div id="createMessage" class="message"></div>
            </form>
        </div>

        <div class="section">
            <h2>User List</h2>
            <div style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center;">
                <input type="text" id="searchInput" placeholder="Search by username or machine serial..."
                    style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em;" />
                <button id="refreshUsersBtn" class="btn btn-secondary">Refresh</button>
            </div>
            <div id="userList"></div>
        </div>
    </main>

    <script src="js/admin.js"></script>
    <script src="js/common.js"></script>
    <script src="js/users.js"></script>
</body>

</html>
