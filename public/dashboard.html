<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - KELALBINGO Admin</title>
    <link rel="stylesheet" href="css/common.css">
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>KELALBINGO</h1>
            <div class="admin-info">
                <div id="adminName"></div>
            </div>
        </div>

        <ul class="sidebar-nav">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="users.html">User Management</a></li>
            <li><a href="packages.html">Balance Packages</a></li>
            <li><a href="logs.html">Activity Logs</a></li>
            <li><a href="change-password.html">Change Password</a></li>
        </ul>

        <div class="sidebar-footer">
            <button id="logoutBtn" class="btn btn-secondary btn-block">Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Dashboard</h1>
            <p>Overview of your bingo system</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Users</h3>
                <p id="totalUsers">0</p>
            </div>
            <div class="stat-card">
                <h3>Synced Users</h3>
                <p id="syncedUsers">0</p>
            </div>
            <div class="stat-card">
                <h3>Pending Users</h3>
                <p id="pendingUsers">0</p>
            </div>
        </div>

        <div class="section">
            <h2>Quick Actions</h2>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <a href="users.html" class="btn btn-primary">Manage Users</a>
                <a href="packages.html" class="btn btn-primary">Assign Packages</a>
                <a href="logs.html" class="btn btn-secondary">View Logs</a>
            </div>
        </div>

        <div class="section">
            <h2>Recent Activity</h2>
            <div id="recentActivity"></div>
        </div>
    </main>

    <script src="js/admin.js"></script>
    <script src="js/common.js"></script>
    <script>
        // Early token validation to prevent malformed JWT errors
        const token = localStorage.getItem('adminToken');
        if (!token || !token.includes('.') || token.split('.').length !== 3) {
            redirectToLogin();
        } else {
            initPage('dashboard.html');
            loadStats();
            loadRecentActivity();
        }

        // Load stats
        async function loadStats() {
            try {
                const response = await apiRequest('/admin/stats');
                if (response.success) {
                    document.getElementById('totalUsers').textContent = response.stats.total;
                    document.getElementById('syncedUsers').textContent = response.stats.synced;
                    document.getElementById('pendingUsers').textContent = response.stats.pending;
                }
            } catch (error) {
                // Error loading stats - handled silently
            }
        }

        // Load recent activity
        async function loadRecentActivity() {
            try {
                const response = await apiRequest('/admin/password-reset-logs');
                if (response.success && response.logs.length > 0) {
                    const recentLogs = response.logs.slice(0, 5);
                    let html = '<table class="data-table"><thead><tr><th>Activity</th><th>User</th><th>Time</th></tr></thead><tbody>';

                    recentLogs.forEach(log => {
                        const time = new Date(log.created_at).toLocaleString();
                        html += `<tr><td>Password Reset Request</td><td>${log.username || 'Unknown'}</td><td>${time}</td></tr>`;
                    });

                    html += '</tbody></table>';
                    document.getElementById('recentActivity').innerHTML = html;
                } else {
                    document.getElementById('recentActivity').innerHTML = '<p class="no-data">No recent activity</p>';
                }
            } catch (error) {
                // Error loading recent activity - handled silently
            }
        }
    </script>
</body>

</html>
